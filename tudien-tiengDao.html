<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Từ Điển Tiếng Dao</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --red: #e63946; --navy: #1d3557; --yellow: #ffb703; --green: #2a9d8f; --bg: #f8f9fa; --dark: #2b2d42; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lexend', sans-serif; }
body { background: var(--bg); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 10px; }
.phone { width: 100%; max-width: 480px; background: #fff; border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.12); overflow: hidden; display: flex; flex-direction: column; min-height: 96vh; }
header { background: linear-gradient(135deg, #ff9f43, #ff6b6b); color: #fff; padding: 18px 20px; text-align: center; position: relative; }
.back-btn { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #fff; font-size: 20px; text-decoration: none; }
header h1 { font-size: 21px; font-weight: 700; }
.search-wrap { padding: 12px 15px; border-bottom: 1px solid #eee; position: relative; }
.search-wrap input { width: 100%; padding: 11px 14px 11px 40px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 14px; outline: none; }
.search-wrap input:focus { border-color: var(--red); }
.search-wrap i { position: absolute; left: 27px; top: 50%; transform: translateY(-50%); color: #a0aec0; font-size: 14px; }
.vocab-list { flex: 1; overflow-y: auto; padding: 12px 14px; max-height: 420px; }
.empty-msg { text-align: center; color: #a0aec0; font-size: 13px; margin-top: 30px; }
.word-item { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
.word-item.editing { border-color: var(--yellow); background: #fffbea; }
.word-index { font-size: 11px; font-weight: 700; color: #a0aec0; min-width: 22px; text-align: center; }
.word-body { flex: 1; min-width: 0; }
.word-vi  { font-size: 15px; font-weight: 700; color: var(--navy); }
.word-dao { font-size: 14px; font-weight: 600; color: var(--red); margin-top: 2px; }
.word-audio { font-size: 10px; color: #a0aec0; margin-top: 3px; font-style: italic; }
.has-audio { color: #2e7d32; } .no-audio { color: #e65100; }
.word-actions { display: flex; gap: 5px; flex-shrink: 0; }
.act-btn { width: 32px; height: 32px; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.act-btn:disabled { opacity: .35; cursor: not-allowed; }
.btn-play { background: #e3f2fd; color: #1e88e5; }
.btn-edit { background: #fff8e1; color: #f59f00; }
.btn-delete { background: #ffebee; color: #e53935; }
.form-section { background: #f1f3f5; border-top: 1px solid #e2e8f0; padding: 14px; border-top-left-radius: 22px; border-top-right-radius: 22px; }
.form-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.form-title i { color: var(--green); }
.rec-card { background: #fff; border: 1px solid #cbd5e1; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
.rec-card-label { font-size: 12px; font-weight: 700; color: #4a5568; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.rec-card-label i { color: var(--red); }
.rec-row { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.btn-rec { display: flex; align-items: center; gap: 5px; background: var(--red); color: #fff; border: none; padding: 8px 13px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-rec.on { background: #2b2d42; animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.btn-stop { display: none; align-items: center; gap: 5px; background: #4a5568; color: #fff; border: none; padding: 8px 13px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-stop.show { display: flex; }
.btn-preview { display: none; align-items: center; gap: 5px; background: #e3f2fd; color: #1e88e5; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-preview.show { display: flex; }
.rec-status { display: none; font-size: 11px; font-weight: 700; color: var(--red); }
.rec-status.show { display: inline; }
.dl-box { display: none; margin-top: 10px; background: #fff8e1; border: 1px dashed var(--yellow); border-radius: 8px; padding: 9px 11px; font-size: 12px; color: #7a4f00; }
.dl-box.show { display: block; }
.btn-dl { display: inline-flex; align-items: center; gap: 4px; margin-top: 6px; background: var(--green); color: #fff; border: none; padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: none; }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 9px; }
.f-input { width: 100%; padding: 11px 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; outline: none; background: #fff; }
.f-input:focus { border-color: var(--green); }
.audio-input-wrap { margin-bottom: 11px; }
.audio-hint { font-size: 11px; color: #718096; margin-top: 4px; padding-left: 3px; }
.audio-hint span { color: var(--green); font-weight: 700; }
.btn-save { width: 100%; background: var(--green); color: #fff; border: none; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; }
.btn-save.edit-mode { background: var(--yellow); color: var(--navy); }
.cancel-link { display: none; text-align: center; font-size: 12px; color: #718096; margin-top: 9px; text-decoration: underline; cursor: pointer; }
.cancel-link.show { display: block; }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #2b2d42; color: #fff; padding: 10px 22px; border-radius: 22px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="phone">
  <header>
    <a href="dichtiengdao.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i></a>
    <h1>Từ Điển Tiếng Dao</h1>
  </header>
  <div class="search-wrap">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="inp-search" placeholder="Tìm kiếm từ vựng..." oninput="renderList()">
  </div>
  <div class="vocab-list" id="vocab-list"></div>
  <div class="form-section">
    <div class="form-title">
      <i class="fa-solid fa-plus-circle" id="form-icon"></i>
      <span id="form-title-text">Thêm Từ Mới</span>
    </div>
    <div class="rec-card">
      <div class="rec-card-label"><i class="fa-solid fa-microphone"></i> Ghi âm tiếng Dao</div>
      <div class="rec-row">
        <span class="rec-status" id="rec-status">&#9679; ĐANG GHI...</span>
        <button class="btn-rec" id="btn-rec" onclick="startRec()"><i class="fa-solid fa-circle"></i> Bắt đầu thu</button>
        <button class="btn-stop" id="btn-stop" onclick="stopRec()"><i class="fa-solid fa-stop"></i> Dừng</button>
        <button class="btn-preview" id="btn-preview" onclick="previewRec()"><i class="fa-solid fa-play"></i> Nghe thử</button>
      </div>
      <div class="dl-box" id="dl-box">
        <strong>&#128229; Tải file âm thanh</strong> rồi bỏ vào thư mục <strong>AmThanh/</strong><br>
        <a class="btn-dl" id="btn-dl" href="#"><i class="fa-solid fa-download"></i> Tải xuống</a>
        <span id="dl-name" style="margin-left:6px;color:var(--green);font-weight:700;font-size:11px;"></span>
      </div>
    </div>
    <div class="input-row">
      <input class="f-input" type="text" id="inp-vi"  placeholder="Tiếng Việt" oninput="onViInput()">
      <input class="f-input" type="text" id="inp-dao" placeholder="Tiếng Dao">
    </div>
    <div class="audio-input-wrap">
      <input class="f-input" type="text" id="inp-audio" placeholder="Tên file âm thanh (VD: an_com.mp3)">
      <div class="audio-hint" id="audio-hint"></div>
    </div>
    <button class="btn-save" id="btn-save" onclick="saveWord()"><i class="fa-solid fa-floppy-disk"></i> Lưu Vào Từ Điển</button>
    <div class="cancel-link" id="cancel-link" onclick="cancelEdit()">Hủy sửa</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var DEFAULT_DATA = [
  { "vi": "ăn cơm", "dao": "Nhin nằng", "audio": "an_com.mp3" },
  { "vi": "đi học", "dao": "Ning ho đăng", "audio": "di_hoc.mp3" },
  { "vi": "đau", "dao": "mủn", "audio": "đau.mp3" },
  { "vi": "tôi", "dao": "Dá", "audio": "tôi.mp3" },
  { "vi": "bố", "dao": "pà/pha", "audio": "bố.mp3" }
];

var dict = []; var editIdx = null; var recBlob = null; var recUrl = null; var mr = null;

// SỬA ĐỔI: Cơ chế nạp dữ liệu thông minh, tránh đè ngược dữ liệu cũ lên LocalStorage
function init() {
  var localData = localStorage.getItem("dao_dict");
  if (localData) {
    try {
      dict = JSON.parse(localData);
      renderList();
      return;
    } catch(e) { console.error(e); }
  }

  fetch('tudien.json?t=' + Date.now())
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (Array.isArray(data) && data.length > 0) {
        dict = data;
      } else {
        dict = cloneArr(DEFAULT_DATA);
      }
      localStorage.setItem("dao_dict", JSON.stringify(dict));
      renderList();
    })
    .catch(function(e) {
      dict = cloneArr(DEFAULT_DATA);
      localStorage.setItem("dao_dict", JSON.stringify(dict));
      renderList();
    });
}

function exportJsonFile() {
  var dataStr = JSON.stringify(dict, null, 2);
  var blob = new Blob([dataStr], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  
  var a = document.createElement('a');
  a.href = url;
  a.download = 'tudien.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function saveLs() {
  localStorage.setItem("dao_dict", JSON.stringify(dict));
}
function cloneArr(a) { return JSON.parse(JSON.stringify(a)); }

function renderList() {
  var kw = g("inp-search").value.trim().toLowerCase();
  var box = g("vocab-list"); box.innerHTML = "";
  var filtered = dict.filter(function(w) { return w.vi.toLowerCase().includes(kw) || w.dao.toLowerCase().includes(kw); });
  if (filtered.length === 0) { box.innerHTML = '<div class="empty-msg">Không tìm thấy từ nào.</div>'; return; }

  filtered.forEach(function(w, fi) {
    var origIdx = dict.findIndex(function(d) { return d.vi.toLowerCase() === w.vi.toLowerCase() && d.dao.toLowerCase() === w.dao.toLowerCase(); });
    var hasAudio = w.audio && w.audio.trim() !== "";
    var audClass = hasAudio ? "has-audio" : "no-audio";
    var audLabel = hasAudio ? '<i class="fa-solid fa-music"></i> ' + xe(w.audio) : '<i class="fa-solid fa-ban"></i> Chưa có âm thanh';
    var isEditing = origIdx === editIdx;

    var d = document.createElement("div");
    d.className = "word-item" + (isEditing ? " editing" : "");
    d.innerHTML = '<div class="word-index">' + (fi + 1) + '</div>' +
      '<div class="word-body"><div class="word-vi">' + xe(w.vi) + '</div><div class="word-dao">&#10148; ' + xe(w.dao) + '</div><div class="word-audio ' + audClass + '">' + audLabel + '</div></div>' +
      '<div class="word-actions">' +
        '<button class="act-btn btn-play" ' + (hasAudio ? '' : 'disabled') + ' onclick="playWord(' + origIdx + ')"><i class="fa-solid fa-volume-high"></i></button>' +
        '<button class="act-btn btn-edit" onclick="startEdit(' + origIdx + ')"><i class="fa-solid fa-pen"></i></button>' +
        '<button class="act-btn btn-delete" onclick="deleteWord(' + origIdx + ')"><i class="fa-solid fa-trash"></i></button>' +
      '</div>';
    box.appendChild(d);
  });
}

function xe(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function playWord(idx) { var w = dict[idx]; if (!w || !w.audio) return; new Audio("AmThanh/" + w.audio.trim()).play().catch(function() { toast("Không tìm thấy file audio."); }); }

function startRec() {
  if (!navigator.mediaDevices) { alert("Trình duyệt không hỗ trợ ghi âm."); return; }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    var mime = bestMime(); try { mr = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream); } catch(e) { mr = new MediaRecorder(stream); }
    var chunks = []; mr.ondataavailable = function(e) { if (e.data && e.data.size > 0) chunks.push(e.data); };
    mr.onstop = function() { recBlob = new Blob(chunks, { type: mr.mimeType || "audio/webm" }); recUrl = URL.createObjectURL(recBlob); showEl("btn-preview"); buildDlLink(); };
    mr.start(100); g("btn-rec").classList.add("on"); g("btn-rec").innerHTML = '<i class="fa-solid fa-circle"></i> Đang thu...'; showEl("btn-stop"); showEl("rec-status");
  }).catch(function() { alert("Lỗi micro."); });
}
function stopRec() { if (mr && mr.state !== "inactive") { mr.stop(); mr.stream.getTracks().forEach(function(t) { t.stop(); }); } g("btn-rec").classList.remove("on"); g("btn-rec").innerHTML = '<i class="fa-solid fa-circle"></i> Thu lại'; hideEl("btn-stop"); hideEl("rec-status"); }
function previewRec() { if (recUrl) new Audio(recUrl).play(); }
function bestMime() { var list = ["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus","audio/mp4"]; for (var i = 0; i < list.length; i++) { try { if (MediaRecorder.isTypeSupported(list[i])) return list[i]; } catch(e) {} } return ""; }
function buildDlLink() { if (!recUrl) return; var name = g("inp-audio").value.trim(); if (!name) { name = toFileName(g("inp-vi").value.trim()) + ".mp3"; g("inp-audio").value = name; renderHint(); } if (name.indexOf(".") === -1) name += ".mp3"; var a = g("btn-dl"); a.href = recUrl; a.setAttribute("download", name); g("dl-name").textContent = "→ " + name; showEl("dl-box"); }
function onViInput() { renderHint(); if (!g("inp-audio").value.trim()) { var s = toFileName(g("inp-vi").value.trim()); if (s) g("inp-audio").value = s + ".mp3"; } }
function renderHint() { var vi = g("inp-vi").value.trim(); var h = g("audio-hint"); if (!vi) { h.innerHTML = ""; return; } h.innerHTML = 'Gợi ý: <span>' + toFileName(vi) + '.mp3</span>'; }
function toFileName(t) { if (!t) return ""; return t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\u0111/g, "d").replace(/\u0110/g, "D").replace(/\s+/g, "_").replace(/[^a-zA-Z0-9_]/g, "").toLowerCase(); }

// SỬA ĐỔI: Tách biệt việc lưu vào trình duyệt và việc xuất/tải file JSON nền
function saveWord() {
  var vi = g("inp-vi").value.trim(); var dao = g("inp-dao").value.trim(); var audio = g("inp-audio").value.trim();
  if (!vi || !dao) { toast("Nhập đủ chữ!"); return; }
  if (!audio) audio = toFileName(vi) + ".mp3";
  if (audio.indexOf(".") === -1) audio += ".mp3";
  var w = { vi: vi, dao: dao, audio: audio };
  if (editIdx === null) { dict.push(w); } else { dict[editIdx] = w; }
  
  saveLs(); // Lưu ngay vào bộ nhớ LocalStorage
  renderList(); 
  resetForm(); 
  toast("Đã cập nhật bộ nhớ tạm thành công!");

  // Thông báo gợi ý để người dùng chép đè dữ liệu nếu làm việc trên mã nguồn gốc
  setTimeout(function() {
    if(confirm("Dữ liệu đã lưu vào trình duyệt (F5 không mất). Bạn có muốn tải file 'tudien.json' mới về để cập nhật vĩnh viễn vào mã nguồn không?")) {
      exportJsonFile();
    }
  }, 500);
}

function startEdit(idx) { editIdx = idx; var w = dict[idx]; g("inp-vi").value = w.vi; g("inp-dao").value = w.dao; g("inp-audio").value = w.audio || ""; renderHint(); g("form-icon").className = "fa-solid fa-pen"; g("form-title-text").textContent = "Đang Sửa Từ"; g("btn-save").classList.add("edit-mode"); g("btn-save").innerHTML = '<i class="fa-solid fa-pen"></i> Cập Nhật'; g("cancel-link").classList.add("show"); renderList(); }
function deleteWord(idx) { if (confirm('Xóa từ?')) { dict.splice(idx, 1); saveLs(); resetForm(); renderList(); toast("Đã xóa."); } }
function cancelEdit() { resetForm(); }
function resetForm() { editIdx = null; g("inp-vi").value = ""; g("inp-dao").value = ""; g("inp-audio").value = ""; g("audio-hint").innerHTML = ""; hideEl("btn-preview"); hideEl("dl-box"); hideEl("rec-status"); hideEl("btn-stop"); g("btn-rec").classList.remove("on"); g("btn-rec").innerHTML = '<i class="fa-solid fa-circle"></i> Bắt đầu thu'; g("form-icon").className = "fa-solid fa-plus-circle"; g("form-title-text").textContent = "Thêm Từ Mới"; g("btn-save").classList.remove("edit-mode"); g("btn-save").innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Lưu Vào Từ Điển'; g("cancel-link").classList.remove("show"); renderList(); }
function g(id) { return document.getElementById(id); }
function showEl(id) { g(id).style.display = "flex"; }
function hideEl(id) { g(id).style.display = "none"; }
function toast(msg) { var t = g("toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(t._t); t._t = setTimeout(function() { t.classList.remove("show"); }, 3000); }
window.onload = init;
</script>
</body>
</html>
